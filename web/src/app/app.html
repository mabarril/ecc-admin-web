<!-- Se não estiver logado, renderiza apenas o router-outlet de tela cheia (ex: tela de login) -->
<ng-container *ngIf="!getCurrentUser()">
  <router-outlet></router-outlet>
</ng-container>

<!-- Se estiver logado, renderiza o layout modernizado com sidebar -->
<div *ngIf="getCurrentUser()" class="flex min-h-screen bg-dark-bg text-gray-100 font-sans">
  
  <!-- Sidebar lateral -->
  <aside class="w-64 bg-white/5 backdrop-blur-md border-r border-white/10 flex flex-col justify-between p-6">
    <div>
      <!-- Cabeçalho do App / Logo -->
      <div class="flex items-center gap-3 mb-8 px-2">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-primary to-brand-accent flex items-center justify-center shadow-lg shadow-brand-primary/20">
          <span class="material-icons text-white">admin_panel_settings</span>
        </div>
        <div>
          <h1 class="text-sm font-bold tracking-wider uppercase text-white leading-none">Administração</h1>
          <span class="text-xs text-gray-400 font-medium">Painel ECC</span>
        </div>
      </div>

      <!-- Links de Navegação -->
      <nav class="space-y-1">
        <a routerLink="/dashboard" routerLinkActive="bg-white/10 text-white font-semibold"
           class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all duration-200">
          <span class="material-icons text-lg">dashboard</span>
          <span>Visão Geral</span>
        </a>
        <a routerLink="/lista-incricao" routerLinkActive="bg-white/10 text-white font-semibold"
           class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all duration-200">
          <span class="material-icons text-lg">assignment</span>
          <span>Inscrições</span>
        </a>
        <a routerLink="/lista-cadastro" routerLinkActive="bg-white/10 text-white font-semibold"
           class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all duration-200">
          <span class="material-icons text-lg">people</span>
          <span>Casais Cadastrados</span>
        </a>
        <a routerLink="/registro" routerLinkActive="bg-white/10 text-white font-semibold"
           class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all duration-200">
          <span class="material-icons text-lg">person_add</span>
          <span>Novo Cadastro</span>
        </a>
      </nav>
    </div>

    <!-- Rodapé da Sidebar / Perfil e Logout -->
    <div class="border-t border-white/10 pt-4">
      <div class="flex items-center justify-between mb-4 px-2">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
            <span class="material-icons text-gray-300 text-sm">account_circle</span>
          </div>
          <div class="overflow-hidden max-w-[120px]">
            <p class="text-xs font-semibold text-white truncate">{{ getCurrentUser()?.nome }}</p>
            <p class="text-[10px] text-gray-400 truncate">Administrador</p>
          </div>
        </div>
        <button (click)="logout()" title="Sair do sistema"
                class="w-8 h-8 rounded-lg bg-red-500/10 hover:bg-red-500/20 text-red-400 hover:text-red-300 flex items-center justify-center transition-colors">
          <span class="material-icons text-sm">logout</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- Área de Conteúdo Principal -->
  <main class="flex-1 flex flex-col min-w-0">
    <!-- Header de Ações Rápidas -->
    <header class="h-16 border-b border-white/10 px-8 flex items-center justify-between bg-white/[0.01] backdrop-blur-sm">
      <div class="flex items-center gap-4 w-96">
        <span class="material-icons text-gray-500">search</span>
        <input type="text" placeholder="Pesquisar inscrições, casais ou relatórios..."
               class="bg-transparent text-sm text-gray-300 placeholder-gray-500 focus:outline-none w-full" />
      </div>

      <div class="flex items-center gap-4">
        <button class="w-8 h-8 rounded-lg bg-white/5 hover:bg-white/10 flex items-center justify-center text-gray-400 hover:text-white transition-colors relative">
          <span class="material-icons text-lg">notifications</span>
          <span class="absolute top-1 right-1 w-2 h-2 bg-brand-primary rounded-full"></span>
        </button>
        <div class="h-6 w-[1px] bg-white/10"></div>
        <div class="flex items-center gap-2">
          <span class="text-xs text-gray-400 font-medium">Olá,</span>
          <span class="text-xs font-semibold text-white">{{ getCurrentUser()?.nome }}</span>
        </div>
      </div>
    </header>

    <!-- Conteúdo da Rota Ativa -->
    <div class="flex-1 p-8 overflow-y-auto max-w-7xl w-full mx-auto">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
